            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 15px;
            display: none;

            flex-direction: column;

            padding: 15px;
            overflow-y: auto;
            flex: 1;
            align-content: start;

            { name: "Tom & Jerry", icon: "🐱", url: "https://live20.bozztv.com/giatvplayout7/giatv-208314/tracks-v1a1/mono.ts.m3u8", category: "kids" },
            { name: "Doraemon", icon: "🤖", url: "https://live20.bozztv.com/giatvplayout7/giatv-209902/tracks-v1a1/mono.ts.m3u8", category: "kids" },
            { name: "Mr Bean", icon: "🧸", url: "https://amg00627-amg00627c29-rakuten-it-3989.playouts.now.amagi.tv/playlist/amg00627-banijayfast-mrbeanitcc-rakutenit/playlist.m3u8", category: "kids" },
            { name: "Cartoon Network", icon: "🎨", url: "https://tvsen5.aynaott.com/cartoonnetwork/tracks-v1a1/mono.ts.m3u8", category: "kids" },
            { name: "Gopal Bhar", icon: "👳", url: "https://live20.bozztv.com/giatvplayout7/giatv-209611/tracks-v1a1/mono.ts.m3u8", category: "kids" }
        ];

        const channelGrid = document.getElementById("channelGrid");
        const video = document.getElementById("video");
        const playingTitle = document.getElementById("playingTitle");
        const liveBadge = document.getElementById("liveBadge");
        const loadingMsg = document.getElementById("loadingMsg");
        const errorMsg = document.getElementById("errorMsg");
        const searchBox = document.getElementById("searchBox");
        const tabBtns = document.querySelectorAll(".tab-btn");

        let hls = null;
        let activeCard = null;
        let currentCategory = "all";

        tabBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                tabBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.category;
                renderChannels(searchBox.value);
            });
        });

        function renderChannels(filter = "") {
            channelGrid.innerHTML = "";
            const term = filter.toLowerCase().trim();
            let filtered = channels;
            if (currentCategory !== "all") {
                filtered = filtered.filter(ch => ch.category === currentCategory);
            }
            if (term) {
                filtered = filtered.filter(ch => ch.name.toLowerCase().includes(term));
            }

            if (filtered.length === 0) {
                channelGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#888;">No channels found</div>';
                return;
            }

            filtered.forEach(ch => {
                const card = document.createElement("div");
                card.className = "channel-card";
                card.innerHTML = `<div class="channel-icon">${ch.icon}</div><div class="channel-name">${ch.name}</div>`;
                card.addEventListener("click", () => playChannel(ch.url, ch.name, card));
                channelGrid.appendChild(card);
            });
        }

        searchBox.addEventListener("input", () => renderChannels(searchBox.value));

        function playChannel(url, name, card) {
            if (activeCard) activeCard.classList.remove("active");
            card.classList.add("active");
            activeCard = card;

            playingTitle.textContent = name;
            liveBadge.style.display = "inline-block";
            loadingMsg.style.display = "block";
            errorMsg.style.display = "none";

            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.removeAttribute("src");

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loadingMsg.style.display = "none";
                    video.play().catch(() => {});
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        loadingMsg.style.display = "none";
                        errorMsg.style.display = "block";
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.addEventListener("loadedmetadata", () => {
                    loadingMsg.style.display = "none";
                    video.play().catch(() => {});
                });
            } else {
                loadingMsg.style.display = "none";
                errorMsg.style.display = "block";
            }
        }

        renderChannels();
    </script>
</body>
</html>
