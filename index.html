<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Online TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0b0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #e74c3c;
            z-index: 10;
            flex-shrink: 0;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .header .social-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            color: white;
            white-space: nowrap;
        }

        .telegram-btn {
            background: #0088cc;
        }
        .telegram-btn:hover {
            background: #0077b5;
            transform: scale(1.05);
        }

        .messenger-btn {
            background: #006aff;
        }
        .messenger-btn:hover {
            background: #0055cc;
            transform: scale(1.05);
        }

        .social-btn i {
            font-size: 16px;
        }

        .search-box {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background: #1e1e2a;
            color: white;
            font-size: 14px;
            outline: none;
            min-width: 200px;
            transition: 0.3s;
        }
        .search-box:focus {
            border-color: #e74c3c;
            background: #2a2a3a;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== CHANNEL GRID PANEL ===== */
        .channel-panel {
            width: 45%;
            background: #111118;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #2a2a2a;
            overflow: hidden;
        }

        .channel-panel-header {
            padding: 10px 15px;
            background: #1a1a25;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            letter-spacing: 1px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
        }

        .channel-grid::-webkit-scrollbar {
            width: 6px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background: #e74c3c;
            border-radius: 10px;
        }

        .channel-card {
            background: #1e1e2c;
            border-radius: 12px;
            padding: 15px 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            word-break: break-word;
            min-height: 70px;
            position: relative;
            user-select: none;
        }

        .channel-card:hover {
            background: #2a2a3e;
            border-color: #e74c3c;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
        }

        .channel-card.active {
            background: #e74c3c;
            border-color: #e74c3c;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
            transform: scale(1.03);
        }

        .channel-card .card-icon {
            font-size: 24px;
            margin-right: 6px;
        }

        /* ===== PLAYER PANEL ===== */
        .player-panel {
            width: 55%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .player-header {
            padding: 10px 20px;
            background: #1a1a25;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-badge {
            background: #e74c3c;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .video-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #e74c3c;
            display: none;
            z-index: 5;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .loading-overlay.show {
            display: block;
        }

        .error-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 5;
        }
        .error-overlay.show {
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .channel-panel,
            .player-panel {
                width: 100%;
                height: 50%;
            }
            .channel-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 8px;
                padding: 10px;
            }
            .channel-card {
                font-size: 12px;
                min-height: 55px;
                padding: 10px 5px;
            }
            .header {
                padding: 8px 12px;
            }
            .header .logo {
                font-size: 18px;
            }
            .social-btn {
                padding: 6px 10px;
                font-size: 11px;
            }
            .search-box {
                min-width: 130px;
                font-size: 12px;
            }
        }

        @media (max-width: 500px) {
            .channel-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .social-links {
                justify-content: center;
            }
        }
    </style>
</head>

        const channelGrid = document.getElementById("channelGrid");
        const video = document.getElementById("video");
        const currentChannelName = document.getElementById("currentChannelName");
        const liveBadge = document.getElementById("liveBadge");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const errorOverlay = document.getElementById("errorOverlay");
        const searchBox = document.getElementById("searchBox");

        let hls = null;
        let currentActiveCard = null;

        // Load channel cards
        function loadChannels(filter = "") {
            channelGrid.innerHTML = "";

            const filtered = channels.filter(ch =>
                ch.name.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                channelGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#888;">No channels found</div>';
                return;
            }

            filtered.forEach((ch) => {
                const card = document.createElement("div");
                card.className = "channel-card";
                card.innerHTML = `<span class="card-icon">${ch.icon}</span> ${ch.name}`;
                card.onclick = () => playChannel(ch.url, ch.name, card);
                channelGrid.appendChild(card);
            });
        }

        // Search
        searchBox.addEventListener("input", () => {
            loadChannels(searchBox.value);
        });

        // Play function
        function playChannel(url, name, card) {
            // Active card
            if (currentActiveCard) currentActiveCard.classList.remove("active");
            card.classList.add("active");
            currentActiveCard = card;

            // UI updates
            currentChannelName.textContent = "📡 " + name;
            liveBadge.style.display = "inline-block";
            errorOverlay.classList.remove("show");
            loadingOverlay.classList.add("show");

            // Destroy old HLS
            if (hls) {
                hls.destroy();
                hls = null;
            }

            video.pause();
            video.removeAttribute("src");

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true, lowLatencyMode: false });
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loadingOverlay.classList.remove("show");
                    video.play().catch(() => {});
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        loadingOverlay.classList.remove("show");
                        errorOverlay.classList.add("show");
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.addEventListener("loadedmetadata", () => {
                    loadingOverlay.classList.remove("show");
                    video.play().catch(() => {});
                });
            } else {
                loadingOverlay.classList.remove("show");
                errorOverlay.classList.add("show");
            }
        }

        // Init
        loadChannels();
