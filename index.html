    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a10;
            color: white;
            font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: #111122;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid #e63946;
            flex-shrink: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo span {
            color: #e63946;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 8px 18px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
            outline: none;
            width: 200px;
            transition: 0.3s;
        }
        .search-box:focus {
            border-color: #e63946;
            box-shadow: 0 0 10px rgba(230,57,70,0.4);
        }

        .social-btn {
            padding: 8px 16px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .tg-btn { background: #0088cc; }
        .tg-btn:hover { background: #0077b5; }
        .msg-btn { background: #006aff; }
        .msg-btn:hover { background: #0055cc; }

        /* MAIN CONTENT */
        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        /* VIDEO SECTION (TOP) */
        .video-section {
            flex: 0 0 60%;
            background: black;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
        .video-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .live-dot {
            background: #e63946;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100%{opacity:1;} 50%{opacity:0.4;}
        }
        .status-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 15px;
            display: none;
        }
        .status-indicator.loading { color: #e63946; display: block; }
        .status-indicator.error { color: #ff6b6b; display: block; }

        /* CHANNEL SECTION (BOTTOM) */
        .channel-section {
            flex: 1;
            background: #111118;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid #2a2a3a;
        }
        .section-title {
            padding: 10px 20px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
            color: #ccc;
            background: #0d0d14;
            border-bottom: 1px solid #2a2a3a;
        }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
        }
        .channel-grid::-webkit-scrollbar {
            width: 5px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background: #e63946;
            border-radius: 10px;
        }

        .channel-card {
            background: #1e1e30;
            border-radius: 12px;
            padding: 15px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }
        .channel-card:hover {
            background: #2a2a40;
            border-color: #e63946;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }
        .channel-card.active {
            background: #e63946;
            border-color: #e63946;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(230,57,70,0.5);
        }
        .channel-icon {
            font-size: 32px;
            line-height: 1;
        }
        .channel-name {
            font-size: 13px;
            word-break: break-word;
            max-width: 100%;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .video-section { flex: 0 0 45%; }
            .channel-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .video-section { flex: 0 0 40%; }
            .channel-grid { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
            .header-actions { justify-content: center; }
        }
    </style>

        const channelGrid = document.getElementById("channelGrid");
        const video = document.getElementById("video");
        const playingTitle = document.getElementById("playingTitle");
        const liveBadge = document.getElementById("liveBadge");
        const loadingMsg = document.getElementById("loadingMsg");
        const errorMsg = document.getElementById("errorMsg");
        const searchBox = document.getElementById("searchBox");

        let hls = null;
        let activeCard = null;

        function renderChannels(filter = "") {
            channelGrid.innerHTML = "";
            const term = filter.toLowerCase().trim();
            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(term));

            if (filtered.length === 0) {
                channelGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#888;">No channels found</div>';
                return;
            }

            filtered.forEach(ch => {
                const card = document.createElement("div");
                card.className = "channel-card";
                card.innerHTML = `<div class="channel-icon">${ch.icon}</div><div class="channel-name">${ch.name}</div>`;
                card.addEventListener("click", () => playChannel(ch.url, ch.name, card));
                channelGrid.appendChild(card);
            });
        }

        searchBox.addEventListener("input", () => renderChannels(searchBox.value));

        function playChannel(url, name, card) {
            if (activeCard) activeCard.classList.remove("active");
            card.classList.add("active");
            activeCard = card;

            playingTitle.textContent = name;
            liveBadge.style.display = "inline-block";
            loadingMsg.style.display = "block";
            errorMsg.style.display = "none";

            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.removeAttribute("src");

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loadingMsg.style.display = "none";
                    video.play().catch(() => {});
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        loadingMsg.style.display = "none";
                        errorMsg.style.display = "block";
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.addEventListener("loadedmetadata", () => {
                    loadingMsg.style.display = "none";
                    video.play().catch(() => {});
                });
            } else {
                loadingMsg.style.display = "none";
                errorMsg.style.display = "block";
            }
        }

        // initial render
        renderChannels();
