<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Online TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    overflow: hidden;
}

.header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 12px;
    text-align: center;
    border-bottom: 2px solid #e74c3c;
    z-index: 10;
    position: relative;
}

.header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 2px;
}

.search-box {
    margin-top: 8px;
    padding: 8px 15px;
    width: 80%;
    max-width: 400px;
    border-radius: 20px;
    border: none;
    background: #2c2c3e;
    color: white;
    font-size: 14px;
    outline: none;
    transition: 0.3s;
}

.search-box:focus {
    background: #3c3c4e;
    box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
}

.container {
    display: flex;
    height: calc(100vh - 100px);
}

.channels {
    width: 35%;
    min-width: 250px;
    background: #121212;
    overflow-y: auto;
    border-right: 2px solid #2a2a2a;
}

.channels::-webkit-scrollbar {
    width: 6px;
}

.channels::-webkit-scrollbar-thumb {
    background: #e74c3c;
    border-radius: 10px;
}

.channels button {
    width: 100%;
    padding: 14px 20px;
    background: transparent;
    color: #ccc;
    border: none;
    border-bottom: 1px solid #1e1e1e;
    cursor: pointer;
    text-align: left;
    font-size: 14px;
    transition: all 0.3s;
    border-left: 3px solid transparent;
}

.channels button:hover {
    background: #1e1e1e;
    color: white;
    border-left: 3px solid #e74c3c;
    padding-left: 25px;
}

.channels button.active {
    background: #1a1a1a;
    color: #e74c3c;
    border-left: 3px solid #e74c3c;
    font-weight: bold;
    padding-left: 25px;
}

.player-wrapper {
    width: 65%;
    display: flex;
    flex-direction: column;
    background: #000;
}

.channel-name-display {
    text-align: center;
    padding: 12px;
    background: rgba(231, 76, 60, 0.9);
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
    min-height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.player {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    position: relative;
}

video {
    width: 100%;
    max-height: 100%;
    object-fit: contain;
}

.loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #e74c3c;
    display: none;
    z-index: 5;
}

.loading.show {
    display: block;
}

.error-msg {
    color: #ff6b6b;
    text-align: center;
    padding: 10px;
    display: none;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        height: calc(100vh - 90px);
    }
    
    .channels {
        width: 100%;
        max-height: 35%;
        min-width: auto;
    }
    
    .player-wrapper {
        width: 100%;
        height: 65%;
    }
    
    .header h1 {
        font-size: 18px;
    }
    
    .search-box {
        width: 90%;
        font-size: 12px;
    }
}
</style>
</head>

<body>

    <h1>📺 My Online TV</h1>
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search channels...">

    <div class="channels" id="channelList"></div>

    <div class="player-wrapper">
        <div class="channel-name-display" id="channelName">Select a Channel</div>
        <div class="player">
            <video id="video" controls autoplay playsinline></video>

const list = document.getElementById("channelList");
const video = document.getElementById("video");
const channelName = document.getElementById("channelName");
const loading = document.getElementById("loading");
const errorMsg = document.getElementById("errorMsg");
const searchBox = document.getElementById("searchBox");

let hls = null;
let currentActiveBtn = null;

// Load channel buttons
function loadChannels(filter = "") {
    list.innerHTML = "";
    
    const filteredChannels = channels.filter(ch => 
        ch.name.toLowerCase().includes(filter.toLowerCase())
    );
    
    filteredChannels.forEach((ch) => {
        let btn = document.createElement("button");
        btn.innerText = ch.name;
        btn.onclick = () => {
            playChannel(ch.url, ch.name, btn);
        };
        list.appendChild(btn);
    });
}

// Search functionality
searchBox.addEventListener("input", () => {
    loadChannels(searchBox.value);
});

// Play channel
function playChannel(url, name, btn) {
    // Update active button
    if (currentActiveBtn) {
        currentActiveBtn.classList.remove("active");
    }
    btn.classList.add("active");
    currentActiveBtn = btn;
    
    // Update channel name display
    channelName.innerText = "📡 " + name;
    errorMsg.style.display = "none";
    loading.classList.add("show");
    
    // Destroy previous HLS instance
    if (hls) {
        hls.destroy();
        hls = null;
    }
    
    // Reset video
    video.pause();
    video.removeAttribute("src");
    
    if (Hls.isSupported()) {
        hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
        });
        
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            loading.classList.remove("show");
            video.play().catch(() => {
                errorMsg.style.display = "block";
                errorMsg.innerText = "⚠️ Click play button to start";
            });
        });
        
        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                loading.classList.remove("show");
                errorMsg.style.display = "block";
                errorMsg.innerText = "❌ Stream unavailable. Try another channel.";
                
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        hls.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        hls.recoverMediaError();
                        break;
                    default:
                        hls.destroy();
                        break;
                }
            }
        });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        video.addEventListener("loadedmetadata", () => {
            loading.classList.remove("show");
            video.play().catch(() => {});
        });
    } else {
        loading.classList.remove("show");
        errorMsg.style.display = "block";
        errorMsg.innerText = "❌ Your browser doesn't support this stream.";
    }
}

// Initial load
loadChannels();
