        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0a0a10;--header-bg:#111122;--card-bg:#1e1e30;--card-hover:#2a2a40;
            --text:white;--text-light:#ccc;--border:#2a2a3a;--accent:#e63946;
            --sidebar-bg:#1a1a2e;--section-bg:#111118;--tab-bg:#0d0d14;--overlay-bg:rgba(0,0,0,0.7)
        }
        .light-mode{
            --bg:#f0f0f5;--header-bg:#fff;--card-bg:#fff;--card-hover:#f5f5f5;
            --text:#111;--text-light:#444;--border:#ddd;--sidebar-bg:#fff;
            --section-bg:#f8f8f8;--tab-bg:#eee;--overlay-bg:rgba(0,0,0,0.4)
        }
        body{
            background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans Bengali',sans-serif;
            height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .3s,color .3s
        }
        /* Notification */
        .notification-bar{
            background:#222;color:#f1c40f;padding:6px 0;overflow:hidden;white-space:nowrap;
            cursor:pointer;z-index:11;border-bottom:1px solid var(--border)
        }
        .notification-bar a{
            display:inline-block;padding-left:100%;animation:marquee 18s linear infinite;color:#f1c40f;text-decoration:none;font-weight:500
        }
        @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
        /* Header */
        .header{
            background:var(--header-bg);padding:10px 20px;display:flex;align-items:center;
            justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:2px solid var(--accent);
            flex-shrink:0;z-index:10
        }
        .more-btn{
            background:var(--accent);border:none;color:white;padding:10px 18px;border-radius:25px;
            font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;margin-right:12px
        }
        .more-btn:hover{background:#c0392b}
        .logo{font-size:22px;font-weight:bold;white-space:nowrap;display:flex;align-items:center;gap:5px;color:var(--text)}
        .logo span{color:var(--accent)}
        .header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .search-box{
            padding:8px 18px;border-radius:25px;border:1px solid var(--border);background:var(--card-bg);
            color:var(--text);font-size:14px;outline:none;width:200px
        }
        .search-box:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(230,57,70,0.4)}
        .social-btn,.yt-btn{
            padding:8px 16px;border-radius:25px;text-decoration:none;color:white;font-weight:600;
            font-size:13px;display:flex;align-items:center;gap:5px;border:none;cursor:pointer
        }
        .tg-btn{background:#0088cc}.tg-btn:hover{background:#0077b5}
        .msg-btn{background:#006aff}.msg-btn:hover{background:#0055cc}
        .yt-btn{background:#ff0000}.yt-btn:hover{background:#cc0000}
        .theme-btn,.refresh-btn{
            background:none;border:1px solid var(--border);color:var(--text);font-size:20px;
            cursor:pointer;padding:5px 10px;border-radius:50%
        }
        .theme-btn:hover,.refresh-btn:hover{background:var(--card-hover)}
        /* Sidebar */
        .sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);z-index:20;display:none}
        .sidebar-overlay.open{display:block}
        .playlist-sidebar{
            position:fixed;top:0;left:-320px;width:320px;height:100%;background:var(--sidebar-bg);
            z-index:30;transition:left .3s;display:flex;flex-direction:column;box-shadow:2px 0 20px rgba(0,0,0,0.8);color:var(--text)
        }
        .playlist-sidebar.open{left:0}
        .sidebar-header{padding:15px;background:var(--tab-bg);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .sidebar-header h3{font-size:18px;color:var(--accent)}
        .close-sidebar{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}
        .sidebar-body{flex:1;overflow-y:auto;padding:10px}
        .playlist-item{padding:12px 15px;margin-bottom:5px;background:var(--card-bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;border:1px solid transparent;color:var(--text);justify-content:space-between}
        .playlist-item:hover{background:var(--card-hover);border-color:var(--accent)}
        .fav-star-m3u{font-size:18px;cursor:pointer;color:#888}
        .fav-star-m3u.fav{color:#f1c40f}
        /* Main content */
        .main-content{display:flex;flex-direction:column;flex:1;overflow:hidden}
        .video-section{flex:0 0 60%;background:black;position:relative;display:flex;align-items:center;justify-content:center}
        video{width:100%;height:100%;object-fit:contain;background:black}
        .video-overlay{position:absolute;top:20px;left:20px;background:rgba(0,0,0,0.7);padding:8px 18px;border-radius:20px;font-weight:bold;font-size:16px;display:flex;align-items:center;gap:10px;color:white}
        .live-dot{background:#e63946;padding:3px 10px;border-radius:15px;font-size:12px;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        .pip-btn{position:absolute;bottom:20px;right:20px;background:rgba(0,0,0,0.7);border:none;color:white;font-size:20px;padding:8px 12px;border-radius:10px;cursor:pointer;z-index:5}
        .pip-btn:hover{background:var(--accent)}
        .status-indicator{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:8px 20px;border-radius:20px;font-size:15px;display:none;color:white}
        .status-indicator.loading{color:#e63946;display:block}
        .status-indicator.error{color:#ff6b6b;display:block}
        /* Channel section */
        .channel-section{flex:1;background:var(--section-bg);display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--border)}
        .tabs{display:flex;background:var(--tab-bg);border-bottom:1px solid var(--border);padding:0 15px;gap:5px;overflow-x:auto}
        .tab-btn{padding:10px 18px;background:transparent;border:none;color:var(--text-light);font-weight:600;font-size:14px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
        .tab-btn:hover{color:var(--text)}
        .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
        .channel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:15px;overflow-y:auto;flex:1;align-content:start}
        .channel-card{background:var(--card-bg);border-radius:12px;padding:15px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:0.2s;border:2px solid transparent;text-align:center;font-size:14px;font-weight:500;color:var(--text-light);position:relative}
        .channel-card:hover{background:var(--card-hover);border-color:var(--accent);color:var(--text);transform:translateY(-3px);box-shadow:0 6px 15px rgba(0,0,0,0.5)}
        .channel-card.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:bold;box-shadow:0 0 20px rgba(230,57,70,0.5)}
        .logo-container{width:48px;height:48px;position:relative}

        .fallback-tv-icon{font-size:32px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border-radius:50%}
        .channel-name{font-size:13px;word-break:break-word;max-width:100%}
        .favorite-star{position:absolute;top:5px;right:8px;font-size:18px;cursor:pointer;z-index:2;color:#888;background:none;border:none}
        .favorite-star.fav{color:#f1c40f;text-shadow:0 0 8px rgba(241,196,15,0.8)}

        @media (max-width:600px){.video-section{flex:0 0 40%}.channel-grid{grid-template-columns:repeat(2,1fr)}.header{flex-direction:column;align-items:stretch}.search-box{width:100%}.header-actions{justify-content:center}}

        // DOM references
        const channelGrid = document.getElementById("channelGrid");
        const video = document.getElementById("video");
        const playingTitle = document.getElementById("playingTitle");
        const liveBadge = document.getElementById("liveBadge");
        const loadingMsg = document.getElementById("loadingMsg");
        const errorMsg = document.getElementById("errorMsg");
        const searchBox = document.getElementById("searchBox");
        const tabBtns = document.querySelectorAll(".tab-btn");
        const themeToggle = document.getElementById("themeToggle");
        const pipButton = document.getElementById("pipButton");
        const refreshBtn = document.getElementById("refreshBtn");
        const moreBtn = document.getElementById("moreBtn");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const playlistSidebar = document.getElementById("playlistSidebar");
        const closeSidebar = document.getElementById("closeSidebar");
        const playlistItems = document.getElementById("playlistItems");
        const openYtBtn = document.getElementById("openYtBtn");

        let hls = null;
        let activeCard = null;
        let currentCategory = "all";

        // Favorites
        function getFavorites() {
            try { return JSON.parse(localStorage.getItem("favCh")) || []; } catch(e) { return []; }
        }
        function saveFavorites(f) { localStorage.setItem("favCh", JSON.stringify(f)); }
        function toggleFavorite(channelName) {
            const favs = getFavorites();
            const idx = favs.indexOf(channelName);
            if (idx > -1) favs.splice(idx, 1);
            else favs.push(channelName);
            saveFavorites(favs);
            renderChannels(searchBox.value);
            loadM3U();
        }
        function isFavorite(channelName) { return getFavorites().includes(channelName); }

        // Theme
        function toggleTheme() {
            document.body.classList.toggle("light-mode");
            themeToggle.innerHTML = document.body.classList.contains("light-mode") ? "☀️" : "🌙";
            localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
        }
        if (localStorage.getItem("theme") === "light") {
            document.body.classList.add("light-mode");
            themeToggle.innerHTML = "☀️";
        }
        themeToggle.addEventListener("click", toggleTheme);

        // Refresh
        refreshBtn.addEventListener("click", () => location.reload());

        // PiP
        pipButton.addEventListener("click", async () => {
            try {
                if (document.pictureInPictureElement) await document.exitPictureInPicture();
                else if (document.pictureInPictureEnabled && video.videoWidth) await video.requestPictureInPicture();
            } catch(e) {}
        });

        // Sidebar
        function openSidebar() { playlistSidebar.classList.add("open"); sidebarOverlay.classList.add("open"); }
        function closeSidebarFn() { playlistSidebar.classList.remove("open"); sidebarOverlay.classList.remove("open"); }
        moreBtn.addEventListener("click", openSidebar);
        closeSidebar.addEventListener("click", closeSidebarFn);
        sidebarOverlay.addEventListener("click", closeSidebarFn);

        // YouTube No Ads button - opens Invidious
        openYtBtn.addEventListener("click", () => {
            window.open("https://inv.nadeko.net", "_blank");
        });

        // Load M3U playlist with favorites
        async function loadM3U() {
            const proxyUrl = "https://api.codetabs.com/v1/proxy?quest=";
            const m3uUrl = "https://go.skym3u.top/69di.m3u";
            try {
                const res = await fetch(proxyUrl + encodeURIComponent(m3uUrl));
                if (!res.ok) throw new Error("Network error");
                const text = await res.text();
                const lines = text.split("\n");
                const items = [];
                let currentName = "";
                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith("#EXTINF:")) {
                        const comma = line.indexOf(",");
                        currentName = comma !== -1 ? line.substring(comma+1).trim() : "Unknown";
                    } else if (line && !line.startsWith("#")) {
                        if (currentName) { items.push({ name: currentName, url: line }); currentName = ""; }
                    }
                }
                playlistItems.innerHTML = "";
                if (!items.length) {
                    playlistItems.innerHTML = "<p style='text-align:center;padding:20px;'>No channels found</p>";
                    return;
                }
                items.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "playlist-item";
                    const isFav = isFavorite(item.name);
                    div.innerHTML = `<span style="cursor:pointer;flex:1">▶️ ${item.name}</span><span class="fav-star-m3u ${isFav?'fav':''}" data-name="${item.name}">★</span>`;
                    div.querySelector("span").addEventListener("click", () => { playChannel(item.url, item.name, null); closeSidebarFn(); });
                    div.querySelector(".fav-star-m3u").addEventListener("click", e => {
                        e.stopPropagation();
                        toggleFavorite(item.name);
                    });
                    playlistItems.appendChild(div);
                });
            } catch(e) {
                playlistItems.innerHTML = "<p style='text-align:center;padding:20px;color:#ff6b6b;'>Failed to load playlist</p>";
            }
        }
        loadM3U();

        // Tab handling
        tabBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                tabBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.category;
                renderChannels(searchBox.value);
            });
        });

        // Render channels
        function renderChannels(filter = "") {
            channelGrid.innerHTML = "";
            const term = filter.toLowerCase().trim();
            let filtered = channels;
            if (currentCategory === "favorites") {
                const favNames = getFavorites();
                filtered = filtered.filter(ch => favNames.includes(ch.name));
            } else if (currentCategory !== "all") {
                filtered = filtered.filter(ch => ch.category === currentCategory);
            }
            if (term) filtered = filtered.filter(ch => ch.name.toLowerCase().includes(term));
            if (!filtered.length) {
                channelGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#888;">No channels found</div>';
                return;
            }
            filtered.forEach(ch => {
                const card = document.createElement("div");
                card.className = "channel-card";

                const logoContainer = document.createElement("div");
                logoContainer.className = "logo-container";
                const fallback = document.createElement("div");
                fallback.className = "fallback-tv-icon";
                fallback.textContent = "📺";
                fallback.style.display = "block";
                logoContainer.appendChild(fallback);

                if (ch.logo && ch.logo.trim() !== "") {
                    const img = document.createElement("img");
                    img.className = "channel-logo";
                    img.src = ch.logo;
                    img.alt = ch.name;
                    img.style.position = "absolute"; img.style.top = "0"; img.style.left = "0"; img.style.display = "none";
                    const showLogo = () => { img.style.display = "block"; fallback.style.display = "none"; };
                    img.onload = showLogo;
                    img.onerror = () => img.remove();
                    if (img.complete) showLogo();
                    logoContainer.appendChild(img);
                }

                const star = document.createElement("button");
                star.className = "favorite-star" + (isFavorite(ch.name) ? " fav" : "");
                star.textContent = "★";
                star.addEventListener("click", e => {
                    e.stopPropagation();
                    toggleFavorite(ch.name);
                });

                const nameDiv = document.createElement("div");
                nameDiv.className = "channel-name";
                nameDiv.textContent = ch.name;

                card.appendChild(logoContainer);
                card.appendChild(nameDiv);
                card.appendChild(star);
                card.addEventListener("click", e => {
                    if (e.target === star) return;
                    playChannel(ch.url, ch.name, card);
                });
                channelGrid.appendChild(card);
            });
        }

        searchBox.addEventListener("input", () => renderChannels(searchBox.value));

        function playChannel(url, name, card) {
            if (card) {
                if (activeCard) activeCard.classList.remove("active");
                card.classList.add("active");
                activeCard = card;
            } else {
                if (activeCard) activeCard.classList.remove("active");
                activeCard = null;
            }
            playingTitle.textContent = name;
            liveBadge.style.display = "inline-block";
            loadingMsg.style.display = "block";
            errorMsg.style.display = "none";

            if (hls) { hls.destroy(); hls = null; }
            video.pause(); video.removeAttribute("src");

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { loadingMsg.style.display = "none"; video.play().catch(()=>{}); });
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        loadingMsg.style.display = "none"; errorMsg.style.display = "block";
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                            default: hls.destroy(); break;
                        }
                    }
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.addEventListener("loadedmetadata", () => { loadingMsg.style.display = "none"; video.play().catch(()=>{}); });
            } else {
                loadingMsg.style.display = "none"; errorMsg.style.display = "block";
            }
        }

        // Initial render
        renderChannels();
    </script>
