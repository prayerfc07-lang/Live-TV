<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV by F. M. Prayer</title>

    <style>
        :root {
            --bg: #0a0a0f;
            --panel-bg: #12121a;
            --card-bg: #1a1a28;
            --card-hover: #252540;
            --accent: #e63946;
            --accent-glow: rgba(230, 57, 70, 0.6);
            --text: #ddd;
            --text-light: #aaa;
            --border: #2a2a3a;
            --header-bg: #0d0d14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Noto Sans Bengali', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo .tv-icon {
            font-size: 28px;
            color: var(--accent);
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 6px 18px;
            border: 1px solid var(--border);
            flex: 1;
            max-width: 350px;
            transition: 0.3s;
        }

        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
            width: 100%;
            padding: 6px;
        }

        .search-bar .search-icon {
            color: var(--text-light);
            margin-right: 8px;
        }

        .social-btns {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .telegram-btn {
            background: #0088cc;
            border-color: #0088cc;
        }
        .telegram-btn:hover {
            background: #0077b5;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.6);
        }

        .messenger-btn {
            background: #006aff;
            border-color: #006aff;
        }
        .messenger-btn:hover {
            background: #0055cc;
            box-shadow: 0 0 15px rgba(0, 106, 255, 0.6);
        }

        /* MAIN LAYOUT */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* CHANNEL PANEL (LEFT SIDEBAR / GRID) */
        .channel-panel {
            width: 40%;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .panel-header {
            padding: 12px 18px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--accent);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
        }

        .channel-grid::-webkit-scrollbar {
            width: 5px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .channel-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        .channel-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .channel-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            color: white;
            background: var(--card-hover);
        }

        .channel-card:hover::before {
            opacity: 0.4;
        }

        .channel-card.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: bold;
            box-shadow: 0 0 25px var(--accent-glow);
            transform: scale(1.02);
        }
        .channel-card.active::before {
            display: none;
        }

        .channel-icon {
            font-size: 28px;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        /* PLAYER PANEL (RIGHT) */
        .player-panel {
            width: 60%;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .player-header {
            padding: 10px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-title {
            font-weight: 600;
            font-size: 16px;
            flex: 1;
        }

        .live-tag {
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 15px;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay {
            color: var(--accent);
            display: none;
        }

        .error-overlay {
            color: #ff6b6b;
            display: none;
        }

        /* RESPONSIVE */
        @media (max-width: 800px) {
            .main-container {
                flex-direction: column;
            }
            .channel-panel,
            .player-panel {
                width: 100%;
                height: 50%;
            }
            .channel-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .header {
                padding: 10px 15px;
            }
            .logo {
                font-size: 18px;
            }
        }
    </style>

        // DOM elements
        const channelGrid = document.getElementById("channelGrid");
        const video = document.getElementById("video");
        const currentChannelTitle = document.getElementById("currentChannelTitle");
        const liveTag = document.getElementById("liveTag");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const errorOverlay = document.getElementById("errorOverlay");
        const searchBox = document.getElementById("searchBox");

        let hls = null;
        let activeCard = null;

        // Build channel grid
        function renderChannels(filter = "") {
            channelGrid.innerHTML = "";
            const term = filter.toLowerCase().trim();

            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(term));

            if (filtered.length === 0) {
                channelGrid.innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#666;">No channels found</div>';
                return;
            }

            filtered.forEach(ch => {
                const card = document.createElement("div");
                card.className = "channel-card";
                card.innerHTML = `<span class="channel-icon">${ch.icon}</span><span>${ch.name}</span>`;
                card.addEventListener("click", () => playChannel(ch.url, ch.name, card));
                channelGrid.appendChild(card);
            });
        }

        // Search
        searchBox.addEventListener("input", () => renderChannels(searchBox.value));

        // Play function with proper cleanup
        function playChannel(url, name, card) {
            // Active state
            if (activeCard) activeCard.classList.remove("active");
            card.classList.add("active");
            activeCard = card;

            // Update UI
            currentChannelTitle.textContent = name;
            liveTag.style.display = "inline-block";
            errorOverlay.style.display = "none";
            loadingOverlay.style.display = "block";

            // Destroy old instance
            if (hls) {
                hls.destroy();
                hls = null;
            }

            video.pause();
            video.removeAttribute("src");

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loadingOverlay.style.display = "none";
                    video.play().catch(() => {});
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        loadingOverlay.style.display = "none";
                        errorOverlay.style.display = "block";
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.addEventListener("loadedmetadata", () => {
                    loadingOverlay.style.display = "none";
                    video.play().catch(() => {});
                });
            } else {
                loadingOverlay.style.display = "none";
                errorOverlay.style.display = "block";
            }
        }

        // Initial render
        renderChannels();
