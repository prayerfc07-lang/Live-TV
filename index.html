        * {

            padding: 0;

        }

        body {
            background: var(--bg);

            flex-direction: column;

        }

            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.6);
            z-index: 5;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--btn-bg);
            color: white;
            font-size: 15px;
            outline: none;
            width: 220px;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
        }

        .social-btn {
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tg-btn {
            background: #0088cc;
        }
        .tg-btn:hover {
            background: #006da3;
        }

        .msg-btn {
            background: #006aff;
        }
        .msg-btn:hover {
            background: #004ecc;
        }

        /* MAIN LAYOUT */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* CHANNEL SIDEBAR */
        .channel-sidebar {
            width: 42%;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar-header {

            font-weight: 700;
            font-size: 16px;

            color: var(--accent-light);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 8px;
        }

        .channel-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            background: var(--btn-bg);
            border: none;
            border-radius: 14px;
            color: var(--text-light);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            border: 2px solid transparent;
            width: 100%;
        }

        .channel-btn:hover {
            background: var(--btn-hover);
            border-color: var(--accent);
            color: white;
            transform: translateX(6px);
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.5);
        }

        .channel-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 700;
            box-shadow: 0 0 22px rgba(231, 76, 60, 0.5);
            transform: scale(1.02);
        }

        .channel-icon {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }

        .channel-name {
            flex: 1;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* VIDEO PLAYER SIDE */
        .player-side {
            width: 58%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .player-top-bar {
            padding: 10px 20px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .now-playing {
            font-weight: 600;
            font-size: 17px;
            flex: 1;
        }

        .live-badge {
            background: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            pointer-events: none;
            transition: 0.3s;
        }

        .loading-msg {
            color: var(--accent-light);
            display: none;
        }
        .error-msg {
            color: #ff7070;
            display: none;
        }

        /* MOBILE */
        @media (max-width: 800px) {
            .main-container {
                flex-direction: column;
            }
            .channel-sidebar, .player-side {
                width: 100%;
                height: 50%;
            }
            .channel-btn {
                padding: 12px;
                font-size: 14px;
            }
            .logo {
                font-size: 18px;

        const channelList = document.getElementById("channelList");
        const video = document.getElementById("video");
        const nowPlaying = document.getElementById("nowPlaying");
        const liveBadge = document.getElementById("liveBadge");
        const loadingMsg = document.getElementById("loadingMsg");
        const errorMsg = document.getElementById("errorMsg");
        const searchBox = document.getElementById("searchBox");

        let hls = null;
        let activeBtn = null;

        function renderChannels(filter = "") {
            channelList.innerHTML = "";
            const term = filter.toLowerCase().trim();
            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(term));

            if (filtered.length === 0) {
                channelList.innerHTML = '<div style="text-align:center;padding:30px;color:#666;">No channels found</div>';
                return;
            }

            filtered.forEach(ch => {
                const btn = document.createElement("button");
                btn.className = "channel-btn";
                btn.innerHTML = `<span class="channel-icon">${ch.icon}</span><span class="channel-name">${ch.name}</span>`;
                btn.addEventListener("click", () => playChannel(ch.url, ch.name, btn));
                channelList.appendChild(btn);
            });
        }

        searchBox.addEventListener("input", () => renderChannels(searchBox.value));

        function playChannel(url, name, btn) {
            if (activeBtn) activeBtn.classList.remove("active");
            btn.classList.add("active");
            activeBtn = btn;

            nowPlaying.textContent = "📡 " + name;
            liveBadge.style.display = "inline-block";
            loadingMsg.style.display = "block";
            errorMsg.style.display = "none";

            if (hls) { hls.destroy(); hls = null; }
            video.pause();
            video.removeAttribute("src");

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loadingMsg.style.display = "none";
                    video.play().catch(() => {});
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        loadingMsg.style.display = "none";
                        errorMsg.style.display = "block";
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                            default: hls.destroy(); break;
                        }
                    }
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
                video.addEventListener("loadedmetadata", () => {
                    loadingMsg.style.display = "none";
                    video.play().catch(() => {});
                });
            } else {
                loadingMsg.style.display = "none";
                errorMsg.style.display = "block";
            }
        }

        renderChannels();
